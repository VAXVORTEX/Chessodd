<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="handGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background subtle glow -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#handGrad)" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  
  <!-- Sleek stylized push hand icon -->
  <g transform="translate(10, 10) scale(0.8)" fill="url(#handGrad)" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round">
    <!-- Palm / Wrist -->
    <path d="M 20 80 Q 25 50 35 45 L 35 25 Q 35 20 40 20 Q 45 20 45 25 L 45 40 L 50 40 L 50 15 Q 50 10 55 10 Q 60 10 60 15 L 60 40 L 65 40 L 65 18 Q 65 13 70 13 Q 75 13 75 18 L 75 42 L 80 42 L 80 25 Q 80 20 85 20 Q 90 20 90 25 L 90 60 Q 90 85 65 85 L 30 85 Q 20 85 20 80 Z" />
    <!-- Thumb -->
    <path d="M 35 45 Q 15 45 10 55 Q 8 60 15 65 Q 22 70 30 65 L 35 60 Z" />
  </g>
  
  <!-- Push lines / Action wind -->
  <path d="M 5 25 L 20 25" stroke="#FFA500" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M 2 50 L 15 50" stroke="#FFA500" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M 5 75 L 20 75" stroke="#FFA500" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
</svg>
